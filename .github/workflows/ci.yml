name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  tagging:
    name: Generate Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build-and-release:
    name: Build & Release WinSerial
    needs: tagging
    if: ${{ needs.tagging.outputs.new_tag != '' }}
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tagging.outputs.new_tag }}
          submodules: true

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          if (Test-Path "vcpkg") { Remove-Item -Recurse -Force vcpkg }
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Configure CMake
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake" -DCMAKE_BUILD_TYPE=Release -DPROJECT_VERSION="${{ needs.tagging.outputs.new_tag }}"

      - name: Build Project
        run: |
          cmake --build build --config Release

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tagging.outputs.new_tag }}
          body: ${{ needs.tagging.outputs.changelog }}
          files: build/Release/WinSerial.exe
