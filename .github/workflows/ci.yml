name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  tagging:
    name: Generate Tag and Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Calculate Next Version
        id: calc_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch

      - name: Update version in files
        if: ${{ steps.calc_version.outputs.new_version != '' }}
        run: |
          NEW_VER="${{ steps.calc_version.outputs.new_version }}"
          sed -i -E "s/project\(WinSerial VERSION [0-9]+\.[0-9]+\.[0-9]+/project(WinSerial VERSION $NEW_VER/" CMakeLists.txt
          jq ".version = \"$NEW_VER\"" vcpkg.json > tmp.json && mv tmp.json vcpkg.json

      - name: Commit and Push changes
        id: make_commit
        if: ${{ steps.calc_version.outputs.new_version != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt vcpkg.json
          git commit -m "chore(release): bump version to ${{ steps.calc_version.outputs.new_version }} [skip ci]" || echo "No changes to commit"
          git push
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create Tag and Changelog
        id: tag_version
        if: ${{ steps.calc_version.outputs.new_version != '' }}
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.calc_version.outputs.new_version }}
          commit_sha: ${{ steps.make_commit.outputs.commit_sha }}

  build-and-release:
    name: Build and Release
    needs: tagging
    if: ${{ needs.tagging.outputs.new_tag != '' }}
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tagging.outputs.new_tag }}
          submodules: true

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        run: |
          if (Test-Path "vcpkg") { Remove-Item -Recurse -Force vcpkg }
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Configure CMake
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake" -DCMAKE_BUILD_TYPE=Release -DPROJECT_VERSION="${{ needs.tagging.outputs.new_tag }}"

      - name: Build Project
        run: |
          cmake --build build --config Release

      - name: Create Portable Zip
        run: |
          Compress-Archive -Path "build\Release\WinSerial.exe" -DestinationPath "WinSerial-portable.zip" -Force

      - name: Build Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" WinSerial.iss

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tagging.outputs.new_tag }}
          body: ${{ needs.tagging.outputs.changelog }}
          files: |
            build\Installer\WinSerial-setup.exe
            WinSerial-portable.zip
